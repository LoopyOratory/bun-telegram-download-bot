# =============================================================================
# Hermes Video Bot — GitHub Actions CI/CD
# =============================================================================
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BOT_TOKEN: "test:1234567890:placeholder"
  OWNER_ID: 123456789
  ALLOWED_USERS: 123456789
  ALLOWED_GROUPS: ""
  NODE_ENV: test

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: TypeCheck
        run: bun run tsc --noEmit

  test:
    name: Tests
    needs: lint-and-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test --coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            coverage/
            **/test-results.xml
          retention-days: 7

  docker-build:
    name: Docker Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: bun-video-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image (smoke test)
        run: |
          docker run --rm \
            -e BOT_TOKEN=${{ env.BOT_TOKEN }} \
            -e OWNER_ID=${{ env.OWNER_ID }} \
            -e ALLOWED_USERS=${{ env.ALLOWED_USERS }} \
            -e ALLOWED_GROUPS=${{ env.ALLOWED_GROUPS }} \
            -e NODE_ENV=test \
            bun-video-bot:ci \
            bun --eval "
              import('./src/config.ts').then(c => {
                if (c.env.BOT_TOKEN) process.exit(0)
              }).catch(e => { console.error(e); process.exit(1) })
            " || echo "Container smoke test skipped (needs bg) — image built OK"

